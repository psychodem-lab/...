<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gra Milionerzy</title>
    <style>
        body {
            background-color: #0b1021;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            width: 80%;
            max-width: 800px;
            text-align: center;
        }

        #prize-display {
            font-size: 1.2rem;
            color: #ffcc00;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #question-box {
            background-color: #000080;
            border: 2px solid #ffffff;
            border-radius: 50px;
            padding: 20px;
            font-size: 1.5rem;
            margin-bottom: 30px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #answers-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .answer-btn {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #000080;
            border-radius: 30px;
            padding: 15px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .answer-btn:hover {
            background-color: #ff9900;
            color: #000;
        }

        .answer-btn:disabled {
            cursor: not-allowed;
            pointer-events: none;
        }

        .correct {
            background-color: #008000 !important;
            color: #fff !important;
            border-color: #00ff00 !important;
        }

        .wrong {
            background-color: #ff0000 !important;
            color: #fff !important;
            border-color: #ff6666 !important;
        }

        #restart-btn {
            margin-top: 30px;
            padding: 10px 30px;
            font-size: 1.2rem;
            background-color: #ffcc00;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            display: none;
        }

        #restart-btn:hover {
            background-color: #e6b800;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="prize-display">Przygotowywanie gry...</div>
        <div id="question-box">Ładowanie pytań...</div>
        
        <div id="answers-container" style="display: none;">
            <button class="answer-btn" onclick="checkAnswer(0)"></button>
            <button class="answer-btn" onclick="checkAnswer(1)"></button>
            <button class="answer-btn" onclick="checkAnswer(2)"></button>
            <button class="answer-btn" onclick="checkAnswer(3)"></button>
        </div>
        
        <button id="restart-btn" onclick="initGame()">Zagraj ponownie</button>
    </div>

    <script>
        // Tablica nagród (12 pytań)
        const prizeTree = [500, 1000, 2000, 5000, 10000, 20000, 40000, 75000, 125000, 250000, 500000, 1000000];
        
        let allQuestions = [];
        let currentGameQuestions = [];
        let currentQuestionIndex = 0;
        
        // Zmienne obsługujące elementy DOM
        const questionBox = document.getElementById('question-box');
        const prizeDisplay = document.getElementById('prize-display');
        const answersContainer = document.getElementById('answers-container');
        const buttons = document.querySelectorAll('.answer-btn');
        const restartBtn = document.getElementById('restart-btn');

        // Funkcja ładująca plik JSON
        async function fetchQuestions() {
            try {
                const response = await fetch('milion.json');
                if (!response.ok) throw new Error('Nie udało się załadować pliku');
                const data = await response.json();
                allQuestions = data.milionerzy_pytania;
                initGame();
            } catch (error) {
                console.error(error);
                questionBox.innerText = "Błąd: Nie można wczytać pliku milion.json. Pamiętaj, aby uruchomić plik przez serwer lokalny (np. Live Server w VS Code).";
            }
        }

        // Funkcja przygotowująca nową grę
        function initGame() {
            if (allQuestions.length < 12) {
                questionBox.innerText = "Błąd: Za mało pytań w pliku JSON! Potrzebujesz co najmniej 12.";
                return;
            }

            // Losowanie 12 unikalnych pytań na grę
            let shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
            currentGameQuestions = shuffled.slice(0, 12);
            
            currentQuestionIndex = 0;
            
            // Reset interfejsu
            answersContainer.style.display = 'grid';
            restartBtn.style.display = 'none';
            loadQuestion();
        }

        // Funkcja wyświetlająca pytanie i resetująca przyciski
        function loadQuestion() {
            const currentQ = currentGameQuestions[currentQuestionIndex];
            
            questionBox.innerText = `${currentQuestionIndex + 1}. ${currentQ.q}`;
            
            let currentGuaranteed = currentQuestionIndex >= 7 ? 40000 : (currentQuestionIndex >= 2 ? 1000 : 0);
            prizeDisplay.innerText = `Pytanie o: ${prizeTree[currentQuestionIndex]} zł | Gwarantowane: ${currentGuaranteed} zł`;

            buttons.forEach((btn, idx) => {
                btn.innerText = currentQ.a[idx];
                btn.className = 'answer-btn'; // Reset klas CSS
                btn.disabled = false;
            });
        }

        // Funkcja sprawdzająca odpowiedź i obsługująca kolory przycisków
        function checkAnswer(selectedIndex) {
            const currentQ = currentGameQuestions[currentQuestionIndex];
            
            // Zablokuj kliknięcia po wyborze odpowiedzi
            buttons.forEach(btn => btn.disabled = true);

            if (selectedIndex === currentQ.c) {
                // Poprawna odpowiedź -> ZIELONY
                buttons[selectedIndex].classList.add('correct');
                
                setTimeout(() => {
                    currentQuestionIndex++;
                    if (currentQuestionIndex < 12) {
                        loadQuestion();
                    } else {
                        endGame(true);
                    }
                }, 1500); // 1.5 sekundy opóźnienia, aby gracz zobaczył poprawną odpowiedź
                
            } else {
                // Zła odpowiedź -> CZERWONY, Prawdziwa -> ZIELONY
                buttons[selectedIndex].classList.add('wrong');
                buttons[currentQ.c].classList.add('correct');
                
                setTimeout(() => {
                    endGame(false);
                }, 2500);
            }
        }

        // Funkcja kończąca grę (wygrana / przegrana)
        function endGame(won) {
            answersContainer.style.display = 'none';
            restartBtn.style.display = 'block';
            prizeDisplay.innerText = "";
            
            if (won) {
                questionBox.innerText = "GRATULACJE! Zostałeś milionerem! Wygrywasz 1 000 000 zł!";
            } else {
                // Obliczanie wygranej gwarantowanej
                let finalPrize = 0;
                if (currentQuestionIndex >= 7) {
                    finalPrize = 40000;
                } else if (currentQuestionIndex >= 2) {
                    finalPrize = 1000;
                }
                
                questionBox.innerText = `Przykro mi, to błędna odpowiedź. Twoja wygrana to: ${finalPrize} zł.`;
            }
        }

        // Start aplikacji po załadowaniu DOM
        window.onload = fetchQuestions;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Sudoku Mobile-First</title>
    <style>
        :root {
            /* Nowoczesna, łagodna paleta kolorów wg standardów WCAG */
            --bg-color: #f4f6f8;
            --container-bg: #ffffff;
            --primary-color: #0066cc;
            --primary-hover: #0052a3;
            --text-color: #1a1a1a;
            --text-muted: #666666;
            --border-light: #e2e8f0;
            --border-dark: #2d3748;
            --error-color: #dc2626;
            --success-color: #16a34a;
            --fixed-bg: #f8fafc;
            --active-cell: #eff6ff;
            --highlight-cell: #dbeafe;
            --board-size: 95vw;
            --max-board-size: 450px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Zoptymalizowany Tryb Ciemny - redukcja zmęczenia wzroku */
        [data-theme="dark"] {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --primary-color: #3b82f6;
            --primary-hover: #60a5fa;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-light: #334155;
            --border-dark: #94a3b8;
            --error-color: #f87171;
            --success-color: #4ade80;
            --fixed-bg: #0f172a;
            --active-cell: #1e3a8a;
            --highlight-cell: #172554;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .game-container {
            width: 100%;
            max-width: var(--max-board-size);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        h1 { 
            margin: 0; 
            font-size: 1.5rem; 
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--primary-color); 
        }

        .controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 8px; 
        }

        select, .action-btn {
            padding: 12px 8px;
            border-radius: 8px;
            border: 1px solid var(--border-light);
            background: var(--container-bg);
            color: var(--text-color);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
            text-align: center;
            appearance: none; /* Ukrycie natywnej strzałki selecta dla czystszego UI */
        }

        select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23666666%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 10px top 50%;
            background-size: 10px auto;
        }

        .action-btn:active {
            transform: scale(0.96);
            background: var(--border-light);
        }

        .action-btn.primary {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .action-btn.primary:active {
            background: var(--primary-hover);
        }

        /* Board Styling - Czystość przestrzeni */
        #sudoku-board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 2px solid var(--border-dark);
            background: var(--container-bg);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            user-select: none;
            transition: background-color 0.3s;
        }

        .cell {
            border-right: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(1.2rem, 6vw, 1.8rem);
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            cursor: pointer;
            transition: background-color 0.1s ease, color 0.1s ease;
            position: relative;
        }

        /* Czyste pogrubienie bloków 3x3 */
        .cell:nth-child(3n) { border-right: 2px solid var(--border-dark); }
        .cell:nth-child(9n) { border-right: none; }
        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid var(--border-dark); }
        .cell:nth-last-child(-n+9) { border-bottom: none; }

        .cell.fixed { 
            background-color: var(--fixed-bg); 
            font-weight: 700; 
            color: var(--text-color); 
        }

        .cell.active { 
            background-color: var(--active-cell); 
            box-shadow: inset 0 0 0 2px var(--primary-color); 
            z-index: 1; 
        }

        .cell.highlighted:not(.active) { 
            background-color: var(--highlight-cell); 
        }

        .cell.error { 
            color: var(--error-color); 
            background-color: rgba(220, 38, 38, 0.1); 
            font-weight: 700;
        }
        
        /* Notes Mode Grid - Poprawa czytelności */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 100%;
            height: 100%;
            font-size: 0.35em;
            color: var(--text-muted);
            pointer-events: none;
            padding: 2px;
        }

        .note {
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1;
        }

        /* Custom Number Pad - Ergonomia i Feedback */
        .numpad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 5px;
        }

        .numpad button {
            padding: 16px 0;
            font-size: 1.4rem;
            font-variant-numeric: tabular-nums;
            border: 1px solid var(--border-light);
            background: var(--container-bg);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            color: var(--primary-color);
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s, color 0.2s;
        }

        .numpad button:active { 
            transform: scale(0.92);
            background: var(--primary-hover); 
            color: white; 
        }

        .numpad .clear-btn { 
            grid-column: span 3; 
            color: var(--error-color); 
            font-size: 1.1rem;
        }

        .numpad #notes-btn { 
            grid-column: span 2;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .numpad #notes-btn.active { 
            background-color: var(--primary-color); 
            color: white; 
            border-color: var(--primary-color);
        }

        /* Zintegrowany system powiadomień (zamiast alert) */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--container-bg);
            color: var(--text-color);
            padding: 12px 24px;
            border-radius: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            font-weight: 600;
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { border-left: 4px solid var(--success-color); }
        .toast.error { border-left: 4px solid var(--error-color); }
        .toast.warning { border-left: 4px solid #f59e0b; }

    </style>
</head>
<body>

<div class="toast" id="feedback-toast">Powiadomienie</div>

<div class="game-container">
    <div class="header-row">
        <h1>SUDOKU</h1>
        <button class="action-btn" onclick="toggleDarkMode()" style="width: auto; padding: 8px 12px;" aria-label="Zmień motyw">
            <span id="theme-icon">🌙</span>
        </button>
    </div>
    
    <div class="controls">
        <select id="difficulty" onchange="newGame()">
            <option value="easy">Łatwy</option>
            <option value="medium" selected>Średni</option>
            <option value="hard">Trudny</option>
        </select>
        <button class="action-btn" onclick="newGame()">Od nowa</button>
        <button class="action-btn primary" onclick="checkSolution()">Sprawdź</button>
    </div>

    <div id="sudoku-board"></div>

    <div class="numpad">
        <button onclick="inputValue(1)">1</button>
        <button onclick="inputValue(2)">2</button>
        <button onclick="inputValue(3)">3</button>
        <button onclick="inputValue(4)">4</button>
        <button onclick="inputValue(5)">5</button>
        
        <button onclick="inputValue(6)">6</button>
        <button onclick="inputValue(7)">7</button>
        <button onclick="inputValue(8)">8</button>
        <button onclick="inputValue(9)">9</button>
        <button onclick="inputValue('')">✕</button>
        
        <button id="notes-btn" onclick="toggleNotes()">✏️ Notatki (Wył)</button>
        <button class="clear-btn" onclick="clearBoard()">🗑️ Czyść błędy</button>
    </div>
</div>

<script>
    let solution = [];
    let board = [];
    let selectedCell = null;
    let notesMode = false;
    let toastTimeout;

    function showToast(message, type = 'warning') {
        const toast = document.getElementById('feedback-toast');
        toast.textContent = message;
        toast.className = `toast show ${type}`;
        
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    function toggleDarkMode() {
        const body = document.documentElement;
        const icon = document.getElementById('theme-icon');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            icon.textContent = '🌙';
        } else {
            body.setAttribute('data-theme', 'dark');
            icon.textContent = '☀️';
        }
    }

    function toggleNotes() {
        notesMode = !notesMode;
        const btn = document.getElementById('notes-btn');
        if(notesMode) {
            btn.classList.add('active');
            btn.innerHTML = '✏️ Notatki (Wł)';
        } else {
            btn.classList.remove('active');
            btn.innerHTML = '✏️ Notatki (Wył)';
        }
    }

    function generateSudoku(difficulty) {
        const pattern = (r, c) => (3 * (r % 3) + Math.floor(r / 3) + c) % 9;
        const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);
        let nums = shuffle([1,2,3,4,5,6,7,8,9]);
        
        let newBoard = Array.from({length: 9}, (_, r) => 
            Array.from({length: 9}, (_, c) => nums[pattern(r, c)])
        );

        // Ustalenie prawidłowego rozwiązania
        solution = JSON.parse(JSON.stringify(newBoard));

        let attempts = difficulty === 'easy' ? 35 : difficulty === 'medium' ? 45 : 55;
        while(attempts > 0) {
            let r = Math.floor(Math.random() * 9);
            let c = Math.floor(Math.random() * 9);
            if(newBoard[r][c] !== null) {
                newBoard[r][c] = null;
                attempts--;
            }
        }
        return newBoard;
    }

    function renderCell(cell) {
        if (cell.dataset.val) {
            cell.innerHTML = cell.dataset.val;
        } else if (cell.dataset.notes) {
            let notes = cell.dataset.notes.split(',');
            let html = '<div class="notes-grid">';
            for(let i = 1; i <= 9; i++) {
                html += `<div class="note">${notes.includes(i.toString()) ? i : ''}</div>`;
            }
            html += '</div>';
            cell.innerHTML = html;
        } else {
            cell.innerHTML = '';
        }
    }

    function createBoardUI(gameBoard) {
        const boardElement = document.getElementById('sudoku-board');
        boardElement.innerHTML = '';
        
        for(let r=0; r<9; r++) {
            for(let c=0; c<9; c++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.row = r;
                cell.dataset.col = c;
                cell.dataset.val = '';
                cell.dataset.notes = '';
                
                if(gameBoard[r][c] !== null) {
                    cell.dataset.val = gameBoard[r][c];
                    cell.classList.add('fixed');
                }
                
                cell.onclick = () => selectCell(cell);
                renderCell(cell);
                boardElement.appendChild(cell);
            }
        }
    }

    function updateHighlights(val) {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlighted'));
        if(val) {
            document.querySelectorAll('.cell').forEach(c => {
                if(c.dataset.val === val.toString()) {
                    c.classList.add('highlighted');
                }
            });
        }
    }

    function selectCell(cell) {
        if(selectedCell) selectedCell.classList.remove('active');
        selectedCell = cell;
        selectedCell.classList.add('active');
        updateHighlights(cell.dataset.val);
    }

    function inputValue(val) {
        if(!selectedCell || selectedCell.classList.contains('fixed')) return;

        if(val === '') {
            selectedCell.dataset.val = '';
            selectedCell.dataset.notes = '';
            selectedCell.classList.remove('error');
            renderCell(selectedCell);
            updateHighlights('');
            return;
        }

        if(notesMode) {
            if(selectedCell.dataset.val) return; 
            
            let notes = selectedCell.dataset.notes ? selectedCell.dataset.notes.split(',') : [];
            if(notes.includes(val.toString())) {
                notes = notes.filter(n => n !== val.toString()); 
            } else {
                notes.push(val.toString()); 
            }
            selectedCell.dataset.notes = notes.join(',');
            renderCell(selectedCell);
        } else {
            selectedCell.dataset.val = val;
            selectedCell.dataset.notes = ''; 
            selectedCell.classList.remove('error');
            renderCell(selectedCell);
            updateHighlights(val);
        }
    }

    function newGame() {
        const difficulty = document.getElementById('difficulty').value;
        board = generateSudoku(difficulty);
        selectedCell = null;
        updateHighlights('');
        createBoardUI(board);
    }

    function checkSolution() {
        const cells = document.querySelectorAll('.cell:not(.fixed)');
        let isComplete = true;
        let isCorrect = true;

        cells.forEach(cell => {
            const r = cell.dataset.row;
            const c = cell.dataset.col;
            const val = parseInt(cell.dataset.val);

            if(!val) {
                isComplete = false;
            } else if(val !== solution[r][c]) {
                cell.classList.add('error');
                isCorrect = false;
            } else {
                cell.classList.remove('error');
            }
        });

        if(isComplete && isCorrect) {
            showToast("Rewelacja! Rozwiązałeś układankę 🎯", "success");
        } else if(!isComplete && isCorrect) {
            showToast("Jak dotąd wszystko poprawnie. Graj dalej!", "success");
        } else if(!isComplete) {
            showToast("Są błędy na planszy. Popraw je.", "error");
        } else {
            showToast("Plansza pełna, ale są błędy.", "error");
        }
    }

    function clearBoard() {
        const cells = document.querySelectorAll('.cell.error');
        if(cells.length === 0) {
             showToast("Nie ma błędów do wyczyszczenia.", "warning");
             return;
        }
        cells.forEach(cell => {
            cell.dataset.val = '';
            cell.classList.remove('error');
            renderCell(cell);
        });
        showToast("Wyczyszczono błędne pola.", "success");
        if(selectedCell) updateHighlights(selectedCell.dataset.val);
    }

    // Inicjalizacja gry po wczytaniu
    newGame();
</script>

</body>
</html>

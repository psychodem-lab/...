<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Krzyżówka (Mechanika WOW - Swipe)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2b2b45;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            /* Blokada przewijania ekranu podczas mazania po literach na telefonie */
            touch-action: none; 
            user-select: none;
        }

        h1 { margin-bottom: 5px; text-align: center; }
        .info { font-size: 14px; color: #a0a0c0; margin-bottom: 20px; text-align: center; }

        /* Plansza ze słowami */
        .board {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
            min-height: 200px;
        }

        .word-row {
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .letter-box {
            width: 40px;
            height: 40px;
            background-color: #1a1a2e;
            border: 2px solid #4a4a75;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            color: transparent;
            transition: all 0.3s;
        }

        .letter-box.revealed {
            background-color: #e94560;
            border-color: #e94560;
            color: white;
        }

        /* Sekcja wprowadzania */
        .input-display {
            font-size: 28px;
            letter-spacing: 5px;
            font-weight: bold;
            height: 40px;
            margin-bottom: 20px;
            color: #0f3460;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 20px;
            border-radius: 20px;
            min-width: 100px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Koło liter i Canvas */
        .wheel-container {
            position: relative;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background-color: #1a1a2e;
            margin-bottom: 20px;
        }

        /* Płótno do rysowania linii musi ignorować kliknięcia, by przepuszczać je do liter */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 5;
        }

        .wheel-letter {
            position: absolute;
            width: 60px;
            height: 60px;
            background-color: #0f3460;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            z-index: 10;
            transition: background-color 0.2s, transform 0.1s;
        }

        .wheel-letter.active {
            background-color: #e94560;
            transform: scale(1.1);
        }

        #message {
            height: 20px;
            font-weight: bold;
            color: #e94560;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Krzyżówka</h1>
    <div class="info">Połącz litery A, K, O, T. Prawdziwe słowa z SJP.</div>

    <div class="board" id="board"></div>
    <div class="input-display" id="input-display"></div>

    <div class="wheel-container" id="wheel-container">
        <canvas id="line-canvas" width="250" height="250"></canvas>
    </div>

    <div id="message"></div>

    <script>
        const levelLetters = ['A', 'K', 'O', 'T'];
        const validWords = ["AKT", "KAT", "KOT", "KTO", "OKA", "TAK", "TOK", "KOTA"];
        
        let guessedWords = [];
        let currentWord = "";
        
        // Zmienne do obsługi przeciągania
        let isDragging = false;
        let selectedNodes = [];
        let currentPointerPos = { x: 0, y: 0 };

        const boardElement = document.getElementById('board');
        const inputDisplay = document.getElementById('input-display');
        const wheelContainer = document.getElementById('wheel-container');
        const messageElement = document.getElementById('message');
        const canvas = document.getElementById('line-canvas');
        const ctx = canvas.getContext('2d');

        // 1. Inicjalizacja planszy
        function initBoard() {
            validWords.forEach(word => {
                const row = document.createElement('div');
                row.className = 'word-row';
                row.id = `word-${word}`;

                for (let i = 0; i < word.length; i++) {
                    const box = document.createElement('div');
                    box.className = 'letter-box';
                    box.innerText = word[i];
                    row.appendChild(box);
                }
                boardElement.appendChild(row);
            });
        }

        // 2. Inicjalizacja koła i układanie liter
        function initWheel() {
            const radius = 80; 
            const center = 125; // Połowa rozmiaru canvas (250/2)
            
            levelLetters.forEach((letter, index) => {
                const angle = (index / levelLetters.length) * (2 * Math.PI) - (Math.PI / 2);
                const x = center + radius * Math.cos(angle);
                const y = center + radius * Math.sin(angle);

                const btn = document.createElement('div');
                btn.className = 'wheel-letter';
                btn.innerText = letter;
                // Środkowanie elementu (odjęcie połowy jego wymiaru 60x60)
                btn.style.left = `${x - 30}px`;
                btn.style.top = `${y - 30}px`;
                
                // Zapisujemy środek elementu do łatwiejszego rysowania linii
                btn.dataset.cx = x;
                btn.dataset.cy = y;

                wheelContainer.appendChild(btn);
            });
        }

        // --- LOGIKA RYSOWANIA I ZAZNACZANIA ---

        function getClientPos(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        // Zwraca pozycję relatywną do canvasu
        function getCanvasPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function drawLines() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (selectedNodes.length === 0) return;

            ctx.lineWidth = 12;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#e94560';

            ctx.beginPath();
            
            // Rysowanie linii między zaznaczonymi literami
            const firstNode = selectedNodes[0];
            ctx.moveTo(parseFloat(firstNode.dataset.cx), parseFloat(firstNode.dataset.cy));

            for (let i = 1; i < selectedNodes.length; i++) {
                const node = selectedNodes[i];
                ctx.lineTo(parseFloat(node.dataset.cx), parseFloat(node.dataset.cy));
            }

            // Rysowanie linii do aktualnej pozycji palca/kursora
            if (isDragging) {
                const canvasPos = getCanvasPos(currentPointerPos.x, currentPointerPos.y);
                ctx.lineTo(canvasPos.x, canvasPos.y);
            }

            ctx.stroke();
        }

        function startDrag(e) {
            const pos = getClientPos(e);
            // Wykrywanie elementu pod kursorem/palcem
            const target = document.elementFromPoint(pos.x, pos.y);
            
            if (target && target.classList.contains('wheel-letter')) {
                isDragging = true;
                selectedNodes = [target];
                currentWord = target.innerText;
                target.classList.add('active');
                currentPointerPos = pos;
                inputDisplay.innerText = currentWord;
                messageElement.innerText = "";
                drawLines();
            }
        }

        function moveDrag(e) {
            if (!isDragging) return;
            // Zapobiega przewijaniu ekranu na urządzeniach mobilnych podczas gry
            e.preventDefault(); 
            
            currentPointerPos = getClientPos(e);
            const target = document.elementFromPoint(currentPointerPos.x, currentPointerPos.y);

            // Jeśli najechaliśmy na nową literę
            if (target && target.classList.contains('wheel-letter') && !selectedNodes.includes(target)) {
                selectedNodes.push(target);
                currentWord += target.innerText;
                target.classList.add('active');
                inputDisplay.innerText = currentWord;
            }

            // Opcjonalnie: funkcja cofania, jeśli najedziemy na przedostatnią literę
            if (target && selectedNodes.length > 1 && target === selectedNodes[selectedNodes.length - 2]) {
                const removedNode = selectedNodes.pop();
                removedNode.classList.remove('active');
                currentWord = currentWord.slice(0, -1);
                inputDisplay.innerText = currentWord;
            }

            drawLines();
        }

        function stopDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Czyszczenie linii
            selectedNodes.forEach(node => node.classList.remove('active')); // Reset stylów liter
            
            checkWord(); // Sprawdzenie zbudowanego słowa
            
            selectedNodes = [];
            drawLines(); // Wyczyść canvas z pamięci
        }

        // --- SPRAWDZANIE SŁÓW ---

        function checkWord() {
            if (currentWord.length === 0) return;

            if (guessedWords.includes(currentWord)) {
                messageElement.innerText = "To słowo zostało już odgadnięte!";
                messageElement.style.color = "#a0a0c0";
            } else if (validWords.includes(currentWord)) {
                guessedWords.push(currentWord);
                revealWord(currentWord);
                messageElement.innerText = "Dobrze!";
                messageElement.style.color = "#4CAF50";
                
                if (guessedWords.length === validWords.length) {
                    setTimeout(() => alert("Gratulacje! Odgadłeś wszystkie słowa!"), 300);
                }
            } else {
                messageElement.innerText = "Nie ma takiego słowa!";
                messageElement.style.color = "#e94560";
            }
            
            // Czyszczenie interfejsu
            setTimeout(() => {
                currentWord = "";
                inputDisplay.innerText = "";
            }, 600);
        }

        function revealWord(word) {
            const row = document.getElementById(`word-${word}`);
            const boxes = row.querySelectorAll('.letter-box');
            boxes.forEach(box => {
                box.classList.add('revealed');
            });
        }

        // --- PODPIĘCIE EVENTÓW ---

        // Nasłuchiwanie na całym oknie pozwala kontynuować ruch, nawet gdy palec/kursor wyjdzie poza koło
        window.addEventListener('mousedown', startDrag, { passive: false });
        window.addEventListener('mousemove', moveDrag, { passive: false });
        window.addEventListener('mouseup', stopDrag);

        window.addEventListener('touchstart', startDrag, { passive: false });
        window.addEventListener('touchmove', moveDrag, { passive: false });
        window.addEventListener('touchend', stopDrag);

        // Inicjalizacja gry
        initBoard();
        initWheel();
    </script>
</body>
</html>

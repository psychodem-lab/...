<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gra Słowna - Znajdź jak najwięcej słów</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2b2b45;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            touch-action: none; 
            user-select: none;
        }

        h1 { margin-bottom: 5px; text-align: center; }
        .info { font-size: 14px; color: #a0a0c0; margin-bottom: 20px; text-align: center; }

        /* Panel na odgadnięte słowa */
        .guessed-panel {
            width: 100%;
            max-width: 350px;
            height: 140px;
            background-color: #1a1a2e;
            border: 2px solid #4a4a75;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 8px;
            box-sizing: border-box;
            position: relative;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #4a4a75 #1a1a2e;
            
        }

        .word-chip {
            background-color: #e94560;
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            animation: popIn 0.3s ease-out;
            cursor: pointer; /* Dodano zmianę kursora dla lepszego UX */
            transition: background-color 0.2s;
        }

        .word-chip:hover {
            background-color: #ff5e78; /* Opcjonalny efekt najechania dla klikalnego elementu */
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .empty-text {
            color: #4a4a75;
            font-style: italic;
            width: 100%;
            text-align: center;
            margin-top: 35px;
            position: absolute;
            left: 0;
        }

        /* Sekcja wprowadzania */
        .input-display {
            font-size: 28px;
            letter-spacing: 5px;
            font-weight: bold;
            height: 40px;
            margin-bottom: 20px;
            color: #0f3460;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 20px;
            border-radius: 20px;
            min-width: 100px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Koło liter i Canvas */
        .wheel-container {
            position: relative;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background-color: #1a1a2e;
            margin-bottom: 20px;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 5;
        }

        .wheel-letter {
            position: absolute;
            width: 60px;
            height: 60px;
            background-color: #0f3460;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            z-index: 10;
            transition: background-color 0.2s, transform 0.1s;
        }

        .wheel-letter.active {
            background-color: #e94560;
            transform: scale(1.1);
        }

        #message {
            height: 20px;
            font-weight: bold;
            color: #e94560;
            margin-top: 10px;
            text-align: center;
        }

        .stats {
            margin-top: 10px;
            font-size: 14px;
            color: #a0a0c0;
        }

        /* Przycisk nowych liter */
        .btn-new-level {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #4CAF50;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-new-level:hover {
            background-color: #45a049;
        }

        .btn-new-level:active {
            transform: scale(0.95);
        }
                /* Przycisk losowania na środku koła */
        .shuffle-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background-color: #4a4a75;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            z-index: 20; /* Wyżej niż litery i linie */
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transition: background-color 0.3s, transform 0.2s;
        }
        
        .shuffle-btn:hover {
            background-color: #5a5a85;
        }
        
        .shuffle-btn:active {
            transform: translate(-50%, -50%) scale(0.9);
        }
        
        .shuffle-btn svg {
            transition: transform 0.4s ease;
        }
        
        .shuffle-btn:active svg {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>

    <h1>Znajdź Słowa</h1>
    <div class="info">Połącz litery. Znajdź jak najwięcej haseł ze słownika.</div>

    <div class="guessed-panel" id="guessed-panel">
        <div class="empty-text" id="empty-text">Tu pojawią się odgadnięte słowa...</div>
    </div>

    <div class="input-display" id="input-display"></div>

    <div class="wheel-container" id="wheel-container">
        <canvas id="line-canvas" width="250" height="250"></canvas>
        <button class="shuffle-btn" onclick="shuffleCurrentLetters()" title="Pomieszaj litery">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        </button>
    </div>

    <div id="message"></div>
    <div class="stats" id="stats">Odgadnięto: 0 / 0</div>

    <button class="btn-new-level" onclick="loadRandomLevel()">Zmień zestaw liter</button>

    <script src="poziomy.js"></script>

    <script>
        let currentLevel = null;
        let guessedWords = [];
        let currentWord = "";
        let currentLevelIndex = -1;

        // Zmienne do rysowania
        let isDragging = false;
        let selectedNodes = [];
        let currentPointerPos = { x: 0, y: 0 };

        const guessedPanel = document.getElementById('guessed-panel');
        const emptyText = document.getElementById('empty-text');
        const inputDisplay = document.getElementById('input-display');
        const wheelContainer = document.getElementById('wheel-container');
        const messageElement = document.getElementById('message');
        const statsElement = document.getElementById('stats');
        const canvas = document.getElementById('line-canvas');
        const ctx = canvas.getContext('2d');

        // --- ZARZĄDZANIE POZIOMAMI ---

        function loadRandomLevel() {
            // Losowanie nowego poziomu (innego niż obecny)
            let newIndex = currentLevelIndex;
            while (newIndex === currentLevelIndex) {
                newIndex = Math.floor(Math.random() * gameLevels.length);
            }
            currentLevelIndex = newIndex;
            currentLevel = gameLevels[currentLevelIndex];

            // Resetowanie stanu gry
            guessedWords = [];
            currentWord = "";
            inputDisplay.innerText = "";
            messageElement.innerText = "";
            
            // Czyszczenie panelu słów (zostawiamy tylko empty-text)
            const chips = guessedPanel.querySelectorAll('.word-chip');
            chips.forEach(chip => chip.remove());
            emptyText.style.display = 'block';

            // Czyszczenie koła liter (usuwamy litery, zostawiamy canvas)
            const oldLetters = wheelContainer.querySelectorAll('.wheel-letter');
            oldLetters.forEach(l => l.remove());
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Generowanie nowego koła
            initWheel();
        }

        // 1. Inicjalizacja koła liter
        function initWheel() {
            const radius = 80;
            const center = 125; 
            const letters = currentLevel.letters;
            
            // Delikatne mieszanie liter na okręgu dla odmiany
            const shuffledLetters = [...letters].sort(() => Math.random() - 0.5);
            shuffledLetters.forEach((letter, index) => {
                const angle = (index / shuffledLetters.length) * (2 * Math.PI) - (Math.PI / 2);
                const x = center + radius * Math.cos(angle);
                const y = center + radius * Math.sin(angle);

                const btn = document.createElement('div');
                btn.className = 'wheel-letter';
                btn.innerText = letter;
                btn.style.left = `${x - 30}px`;
                btn.style.top = `${y - 30}px`;
                btn.dataset.cx = x;
                btn.dataset.cy = y;

                wheelContainer.appendChild(btn);
            });
            updateStats();
        }
            function shuffleCurrentLetters() {
            if (!currentLevel) return;
        
            // Usuwamy tylko wizualne elementy liter z koła (nie ruszamy canvasu ani stanu gry)
            const oldLetters = wheelContainer.querySelectorAll('.wheel-letter');
            oldLetters.forEach(l => l.remove());
        
            // Ponownie inicjalizujemy koło z tymi samymi literami poziomu
            // Funkcja initWheel automatycznie wymiesza je przy tworzeniu (shuffledLetters)
            initWheel();
            
            // Krótki komunikat dla gracza (opcjonalnie)
            messageElement.innerText = "Pomieszano!";
            messageElement.style.color = "#a0a0c0";
            setTimeout(() => {
                if(messageElement.innerText === "Pomieszano!") messageElement.innerText = "";
            }, 1000);
        }

        // --- LOGIKA RYSOWANIA ---

        function getClientPos(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        function getCanvasPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function drawLines() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (selectedNodes.length === 0) return;

            ctx.lineWidth = 12;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#e94560';

            ctx.beginPath();
            const firstNode = selectedNodes[0];
            ctx.moveTo(parseFloat(firstNode.dataset.cx), parseFloat(firstNode.dataset.cy));

            for (let i = 1; i < selectedNodes.length; i++) {
                const node = selectedNodes[i];
                ctx.lineTo(parseFloat(node.dataset.cx), parseFloat(node.dataset.cy));
            }

            if (isDragging) {
                const canvasPos = getCanvasPos(currentPointerPos.x, currentPointerPos.y);
                ctx.lineTo(canvasPos.x, canvasPos.y);
            }

            ctx.stroke();
        }

        function startDrag(e) {
            const pos = getClientPos(e);
            const target = document.elementFromPoint(pos.x, pos.y);
            
            if (target && target.classList.contains('wheel-letter')) {
                isDragging = true;
                selectedNodes = [target];
                currentWord = target.innerText;
                target.classList.add('active');
                currentPointerPos = pos;
                inputDisplay.innerText = currentWord;
                messageElement.innerText = "";
                drawLines();
            }
        }

        function moveDrag(e) {
            if (!isDragging) return;
            e.preventDefault(); 
            
            currentPointerPos = getClientPos(e);
            const target = document.elementFromPoint(currentPointerPos.x, currentPointerPos.y);

            if (target && target.classList.contains('wheel-letter') && !selectedNodes.includes(target)) {
                selectedNodes.push(target);
                currentWord += target.innerText;
                target.classList.add('active');
                inputDisplay.innerText = currentWord;
            }

            if (target && selectedNodes.length > 1 && target === selectedNodes[selectedNodes.length - 2]) {
                const removedNode = selectedNodes.pop();
                removedNode.classList.remove('active');
                currentWord = currentWord.slice(0, -1);
                inputDisplay.innerText = currentWord;
            }

            drawLines();
        }

        function stopDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            selectedNodes.forEach(node => node.classList.remove('active')); 
            
            checkWord(); 
            
            selectedNodes = [];
            drawLines();
        }

        // --- SPRAWDZANIE SŁÓW I AKTUALIZACJA UI ---

        function checkWord() {
            if (currentWord.length < 2) {
                currentWord = "";
                inputDisplay.innerText = "";
                return;
            }

            if (guessedWords.includes(currentWord)) {
                messageElement.innerText = "To słowo zostało już znalezione!";
                messageElement.style.color = "#a0a0c0";
            } else if (currentLevel.words.includes(currentWord)) {
                guessedWords.push(currentWord);
                addWordToPanel(currentWord);
                updateStats();
                
                messageElement.innerText = "Świetnie!";
                messageElement.style.color = "#4CAF50";
                
                if (guessedWords.length === currentLevel.words.length) {
                    setTimeout(() => alert("Niesamowite! Znalazłeś wszystkie możliwe słowa z tego zestawu! Możesz wylosować nowy."), 300);
                }
            } else {
                messageElement.innerText = "Brak słowa w słowniku.";
                messageElement.style.color = "#e94560";
            }
            
            setTimeout(() => {
                currentWord = "";
                inputDisplay.innerText = "";
            }, 600);
        }

        function addWordToPanel(word) {
            if (guessedWords.length === 1) {
                emptyText.style.display = 'none';
            }

            const chip = document.createElement('div');
            chip.className = 'word-chip';
            chip.innerText = word;
            chip.title = "Kliknij, aby sprawdzić znaczenie w sjp.pl";
            
            // --- DODANA FUNKCJONALNOŚĆ SJP.PL ---
            chip.addEventListener('click', function() {
                // Używamy encodeURIComponent na wypadek polskich znaków w adresie URL
                window.open(`https://sjp.pl/${encodeURIComponent(word)}`, '_blank');
            });
            // ------------------------------------

            guessedPanel.appendChild(chip);
            sortPanel();
        }

        function sortPanel() {
            const chips = Array.from(guessedPanel.getElementsByClassName('word-chip'));
            chips.sort((a, b) => a.innerText.localeCompare(b.innerText));
            chips.forEach(chip => guessedPanel.appendChild(chip)); 
        }

        function updateStats() {
            statsElement.innerText = `Odgadnięto: ${guessedWords.length} / ${currentLevel.words.length}`;
        }

        // --- PODPIĘCIE EVENTÓW ---

        window.addEventListener('mousedown', startDrag, { passive: false });
        window.addEventListener('mousemove', moveDrag, { passive: false });
        window.addEventListener('mouseup', stopDrag);

        window.addEventListener('touchstart', startDrag, { passive: false });
        window.addEventListener('touchmove', moveDrag, { passive: false });
        window.addEventListener('touchend', stopDrag);

        // Uruchomienie pierwszej gry (losowy poziom)
        loadRandomLevel();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gra Słowna (Znajdź jak najwięcej słów)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2b2b45;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            touch-action: none; 
            user-select: none;
        }

        h1 { margin-bottom: 5px; text-align: center; }
        .info { font-size: 14px; color: #a0a0c0; margin-bottom: 20px; text-align: center; }

        /* Panel na odgadnięte słowa */
        .guessed-panel {
            width: 100%;
            max-width: 350px;
            min-height: 120px;
            background-color: #1a1a2e;
            border: 2px solid #4a4a75;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 8px;
            box-sizing: border-box;
        }

        /* Pojedyncze odgadnięte słowo (kfelek) */
        .word-chip {
            background-color: #e94560;
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Placeholder gdy panel jest pusty */
        .empty-text {
            color: #4a4a75;
            font-style: italic;
            width: 100%;
            text-align: center;
            margin-top: 35px;
        }

        /* Sekcja wprowadzania */
        .input-display {
            font-size: 28px;
            letter-spacing: 5px;
            font-weight: bold;
            height: 40px;
            margin-bottom: 20px;
            color: #0f3460;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 20px;
            border-radius: 20px;
            min-width: 100px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Koło liter i Canvas */
        .wheel-container {
            position: relative;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background-color: #1a1a2e;
            margin-bottom: 20px;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 5;
        }

        .wheel-letter {
            position: absolute;
            width: 60px;
            height: 60px;
            background-color: #0f3460;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            z-index: 10;
            transition: background-color 0.2s, transform 0.1s;
        }

        .wheel-letter.active {
            background-color: #e94560;
            transform: scale(1.1);
        }

        #message {
            height: 20px;
            font-weight: bold;
            color: #e94560;
            margin-top: 10px;
        }

        .stats {
            margin-top: 10px;
            font-size: 14px;
            color: #a0a0c0;
        }
    </style>
</head>
<body>

    <h1>Znajdź Słowa</h1>
    <div class="info">Połącz litery, aby utworzyć poprawne słowa. Zdobądź ich jak najwięcej!</div>

    <div class="guessed-panel" id="guessed-panel">
        <div class="empty-text" id="empty-text">Tu pojawią się odgadnięte słowa...</div>
    </div>

    <div class="input-display" id="input-display"></div>

    <div class="wheel-container" id="wheel-container">
        <canvas id="line-canvas" width="250" height="250"></canvas>
    </div>

    <div id="message"></div>
    <div class="stats" id="stats">Odgadnięto: 0 / 23</div>

    <script>
        // Litery do ułożenia na kole
        const levelLetters = ['A', 'K', 'O', 'T', 'R'];
        
        // Pula słów symulująca słownik SJP dla liter A, K, O, T, R
        const validWordsDictionary = [
            "AKT", "KAT", "KOT", "KTO", "OKA", "TAK", "TOK", "KOTA", 
            "RAK", "ROK", "TOR", "ORT", "KOR", "TAR", "ART", "TRA", 
            "KORA", "ROTA", "TARO", "KART", "TORA", "TROK", "AKTOR"
        ];
        
        let guessedWords = [];
        let currentWord = "";
        
        // Zmienne do rysowania
        let isDragging = false;
        let selectedNodes = [];
        let currentPointerPos = { x: 0, y: 0 };

        const guessedPanel = document.getElementById('guessed-panel');
        const emptyText = document.getElementById('empty-text');
        const inputDisplay = document.getElementById('input-display');
        const wheelContainer = document.getElementById('wheel-container');
        const messageElement = document.getElementById('message');
        const statsElement = document.getElementById('stats');
        const canvas = document.getElementById('line-canvas');
        const ctx = canvas.getContext('2d');

        // 1. Inicjalizacja koła liter
        function initWheel() {
            const radius = 80; 
            const center = 125; 
            
            levelLetters.forEach((letter, index) => {
                const angle = (index / levelLetters.length) * (2 * Math.PI) - (Math.PI / 2);
                const x = center + radius * Math.cos(angle);
                const y = center + radius * Math.sin(angle);

                const btn = document.createElement('div');
                btn.className = 'wheel-letter';
                btn.innerText = letter;
                btn.style.left = `${x - 30}px`;
                btn.style.top = `${y - 30}px`;
                
                btn.dataset.cx = x;
                btn.dataset.cy = y;

                wheelContainer.appendChild(btn);
            });
            
            updateStats();
        }

        // --- LOGIKA RYSOWANIA ---

        function getClientPos(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        function getCanvasPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function drawLines() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (selectedNodes.length === 0) return;

            ctx.lineWidth = 12;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#e94560';

            ctx.beginPath();
            
            const firstNode = selectedNodes[0];
            ctx.moveTo(parseFloat(firstNode.dataset.cx), parseFloat(firstNode.dataset.cy));

            for (let i = 1; i < selectedNodes.length; i++) {
                const node = selectedNodes[i];
                ctx.lineTo(parseFloat(node.dataset.cx), parseFloat(node.dataset.cy));
            }

            if (isDragging) {
                const canvasPos = getCanvasPos(currentPointerPos.x, currentPointerPos.y);
                ctx.lineTo(canvasPos.x, canvasPos.y);
            }

            ctx.stroke();
        }

        function startDrag(e) {
            const pos = getClientPos(e);
            const target = document.elementFromPoint(pos.x, pos.y);
            
            if (target && target.classList.contains('wheel-letter')) {
                isDragging = true;
                selectedNodes = [target];
                currentWord = target.innerText;
                target.classList.add('active');
                currentPointerPos = pos;
                inputDisplay.innerText = currentWord;
                messageElement.innerText = "";
                drawLines();
            }
        }

        function moveDrag(e) {
            if (!isDragging) return;
            e.preventDefault(); 
            
            currentPointerPos = getClientPos(e);
            const target = document.elementFromPoint(currentPointerPos.x, currentPointerPos.y);

            if (target && target.classList.contains('wheel-letter') && !selectedNodes.includes(target)) {
                selectedNodes.push(target);
                currentWord += target.innerText;
                target.classList.add('active');
                inputDisplay.innerText = currentWord;
            }

            if (target && selectedNodes.length > 1 && target === selectedNodes[selectedNodes.length - 2]) {
                const removedNode = selectedNodes.pop();
                removedNode.classList.remove('active');
                currentWord = currentWord.slice(0, -1);
                inputDisplay.innerText = currentWord;
            }

            drawLines();
        }

        function stopDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            selectedNodes.forEach(node => node.classList.remove('active')); 
            
            checkWord(); 
            
            selectedNodes = [];
            drawLines(); 
        }

        // --- SPRAWDZANIE SŁÓW I AKTUALIZACJA UI ---

        function checkWord() {
            // Ignorujemy pojedyncze litery
            if (currentWord.length < 2) {
                currentWord = "";
                inputDisplay.innerText = "";
                return;
            }

            if (guessedWords.includes(currentWord)) {
                messageElement.innerText = "To słowo zostało już znalezione!";
                messageElement.style.color = "#a0a0c0";
            } else if (validWordsDictionary.includes(currentWord)) {
                // Dodajemy nowe, poprawne słowo
                guessedWords.push(currentWord);
                addWordToPanel(currentWord);
                updateStats();
                
                messageElement.innerText = "Świetnie!";
                messageElement.style.color = "#4CAF50";
                
                if (guessedWords.length === validWordsDictionary.length) {
                    setTimeout(() => alert("Niesamowite! Znalazłeś wszystkie możliwe słowa z tego zestawu!"), 300);
                }
            } else {
                messageElement.innerText = "Brak słowa w słowniku.";
                messageElement.style.color = "#e94560";
            }
            
            setTimeout(() => {
                currentWord = "";
                inputDisplay.innerText = "";
            }, 600);
        }

        function addWordToPanel(word) {
            // Jeśli to pierwsze słowo, usuwamy napis "Tu pojawią się..."
            if (guessedWords.length === 1) {
                emptyText.style.display = 'none';
            }

            // Tworzymy kafelek ze słowem
            const chip = document.createElement('div');
            chip.className = 'word-chip';
            chip.innerText = word;
            
            // Sortowanie alfabetyczne elementów w panelu (opcjonalne, ale ułatwia podgląd graczowi)
            guessedPanel.appendChild(chip);
            sortPanel();
        }

        function sortPanel() {
            const chips = Array.from(guessedPanel.getElementsByClassName('word-chip'));
            chips.sort((a, b) => a.innerText.localeCompare(b.innerText));
            chips.forEach(chip => guessedPanel.appendChild(chip)); // Ponowne dodanie układa je w nowej kolejności
        }

        function updateStats() {
            statsElement.innerText = `Odgadnięto: ${guessedWords.length} / ${validWordsDictionary.length}`;
        }

        // --- PODPIĘCIE EVENTÓW ---

        window.addEventListener('mousedown', startDrag, { passive: false });
        window.addEventListener('mousemove', moveDrag, { passive: false });
        window.addEventListener('mouseup', stopDrag);

        window.addEventListener('touchstart', startDrag, { passive: false });
        window.addEventListener('touchmove', moveDrag, { passive: false });
        window.addEventListener('touchend', stopDrag);

        // Uruchomienie
        initWheel();
    </script>
</body>
</html>

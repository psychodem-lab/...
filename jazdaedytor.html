<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Track Architect 3.0 - Modular Editor</title>
    <style>
        body { margin: 0; display: flex; background: #111; color: white; font-family: sans-serif; }
        #sidebar { width: 300px; padding: 20px; background: #222; border-right: 1px solid #444; height: 100vh; overflow-y: auto; }
        #viewport { flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        canvas { background: #1b5e20; cursor: crosshair; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .control { margin-bottom: 15px; }
        label { display: block; font-size: 10px; text-transform: uppercase; margin-bottom: 5px; color: #00d4ff; }
        input, button { width: 100%; padding: 10px; box-sizing: border-box; background: #333; border: 1px solid #555; color: white; border-radius: 5px; }
        button { background: #00d4ff; color: black; font-weight: bold; cursor: pointer; margin-top: 5px; }
        button.alt { background: #ff4757; color: white; }
        .hint { font-size: 11px; opacity: 0.6; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>NODE EDITOR</h2>
        <div class="control">
            <label>Nazwa Trasy</label>
            <input type="text" id="t-name" value="Modularny Wyścig">
        </div>
        <div class="control">
            <label>Szerokość Drogi</label>
            <input type="range" id="t-width" min="40" max="200" value="100" oninput="draw()">
        </div>
        <div class="control">
            <button onclick="undo()">Cofnij Punkt</button>
            <button class="alt" onclick="clearAll()">Wyczyść Wszystko</button>
        </div>
        <div class="control">
            <label>Tryb klikania</label>
            <button id="m-path" onclick="setMode('path')">Rysuj Drogę</button>
            <button id="m-start" onclick="setMode('start')">Ustaw Start</button>
        </div>
        <button style="background: #27ae60;" onclick="exportJSON()">GENERUJ KOD</button>
        <div class="hint">
            • Klikaj, aby dodawać zakręty<br>
            • Pierwszy punkt to zawsze META<br>
            • Zamknij pętlę, klikając blisko pierwszego punktu
        </div>
    </div>
    <div id="viewport">
        <canvas id="c"></canvas>
    </div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 1200, H = 850;
    canvas.width = W; canvas.height = H;

    let nodes = [];
    let startPos = {x: 600, y: 400, a: 0};
    let mode = 'path';

    function setMode(m) { mode = m; }
    function undo() { nodes.pop(); draw(); }
    function clearAll() { nodes = []; draw(); }

    canvas.addEventListener('mousedown', e => {
        const rect = canvas.getBoundingClientRect();
        const x = Math.round((e.clientX - rect.left) * (W / rect.width));
        const y = Math.round((e.clientY - rect.top) * (H / rect.height));

        if(mode === 'path') nodes.push({x, y});
        else { startPos.x = x; startPos.y = y; }
        draw();
    });

    function draw() {
        ctx.fillStyle = '#1b5e20'; ctx.fillRect(0,0,W,H);
        const width = parseInt(document.getElementById('t-width').value);

        if(nodes.length > 1) {
            ctx.beginPath();
            ctx.lineWidth = width;
            ctx.strokeStyle = '#333';
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.moveTo(nodes[0].x, nodes[0].y);
            nodes.forEach(n => ctx.lineTo(n.x, n.y));
            ctx.stroke();

            // Linie pomocnicze (krawężniki)
            ctx.lineWidth = width + 10;
            ctx.strokeStyle = 'white';
            ctx.setLineDash([20, 20]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Rysuj punkty (Nodes)
        nodes.forEach((n, i) => {
            ctx.fillStyle = i === 0 ? '#ff4757' : '#00d4ff';
            ctx.beginPath(); ctx.arc(n.x, n.y, 5, 0, 7); ctx.fill();
            if(i === 0) {
                ctx.strokeStyle = 'white'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(n.x, n.y, 15, 0, 7); ctx.stroke();
            }
        });

        // Start auto
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillRect(startPos.x-10, startPos.y-18, 20, 36);
    }

    function exportJSON() {
        const data = {
            name: document.getElementById('t-name').value,
            width: parseInt(document.getElementById('t-width').value),
            nodes: nodes,
            start: startPos
        };
        prompt("Skopiuj kod trasy:", JSON.stringify(data));
    }
    draw();
</script>
</body>
</html>

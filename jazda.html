<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Racing - Modular Engine</title>
    <style>
        :root { --accent: #00d4ff; --meta: #ff4757; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #hud { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; color: white; border-left: 4px solid var(--accent); z-index: 10; pointer-events: none; }
        canvas { display: block; background: #1b5e20; width: 100vw; height: 100vh; object-fit: contain; }
        .val { font-weight: bold; font-size: 18px; display: block; }
    </style>
</head>
<body>

<div id="hud">
    <small>TRASA</small> <span id="ui-name" class="val">--</span>
    <small>CZAS</small> <span id="ui-time" class="val">0.00s</span>
    <small>USZKODZENIA</small> <span id="ui-dmg" class="val">0%</span>
</div>

<canvas id="g"></canvas>

<script>
    const canvas = document.getElementById('g');
    const ctx = canvas.getContext('2d');
    const W = 1200, H = 850;
    canvas.width = W; canvas.height = H;

    // PRZYKŁADOWA TRASA MODULARNA (Wklej tu wynik z edytora)
    const track = {
        "name": "Serpentyna Śmierci",
        "width": 100,
        "nodes": [{"x":164,"y":731},{"x":380,"y":731},{"x":549,"y":609},{"x":547,"y":345},{"x":745,"y":207},{"x":1008,"y":267},{"x":1041,"y":557},{"x":859,"y":762},{"x":581,"y":773}],
        "start": {"x":238,"y":731,"a":0}
    };

    const car = {
        x: track.start.x, y: track.start.y, angle: track.start.a,
        vx: 0, vy: 0, speed: 0,
        acc: 0.15, frict: 0.96, turnS: 0.07,
        dmg: 0, onGrass: false
    };

    const keys = {};
    window.onkeydown = e => keys[e.key] = true;
    window.onkeyup = e => keys[e.key] = false;

    let startTime = Date.now();

    function drawTrack() {
        ctx.fillStyle = '#1b5e20'; ctx.fillRect(0,0,W,H);
        
        // Rysowanie drogi ze ścieżki węzłów
        ctx.beginPath();
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.lineWidth = track.width;
        ctx.strokeStyle = '#333';
        ctx.moveTo(track.nodes[0].x, track.nodes[0].y);
        track.nodes.forEach(n => ctx.lineTo(n.x, n.y));
        ctx.stroke();

        // Linia środkowa
        ctx.lineWidth = 2;
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.setLineDash([20, 20]);
        ctx.stroke();
        ctx.setLineDash([]);

        // Meta (pierwszy węzeł)
        ctx.fillStyle = '#ff4757';
        ctx.beginPath(); ctx.arc(track.nodes[0].x, track.nodes[0].y, 10, 0, 7); ctx.fill();
    }

    function update() {
        // Sterowanie
        let thrust = 0;
        if(keys['ArrowUp']) thrust = car.acc;
        if(keys['ArrowDown']) thrust = -car.acc/2;
        
        let turn = 0;
        if(keys['ArrowLeft']) turn = -1;
        if(keys['ArrowRight']) turn = 1;

        car.angle += turn * car.turnS * (Math.min(1, Math.abs(car.speed)/3));
        
        const fx = Math.cos(car.angle), fy = Math.sin(car.angle);
        car.vx += fx * thrust; car.vy += fy * thrust;
        
        // Drifting / Grip
        let dot = car.vx * fx + car.vy * fy;
        let grip = car.onGrass ? 0.9 : 0.85;
        car.vx = fx * dot + (car.vx - fx * dot) * grip;
        car.vy = fy * dot + (car.vy - fy * dot) * grip;

        car.vx *= car.frict; car.vy *= car.frict;
        car.x += car.vx; car.y += car.vy;
        car.speed = Math.hypot(car.vx, car.vy);

        // --- KOLIZJA ZE ŚCIEŻKĄ (Empiryczna) ---
        // Sprawdzamy, czy auto znajduje się wewnątrz "stroke" narysowanej trasy
        ctx.lineWidth = track.width;
        const path = new Path2D();
        path.moveTo(track.nodes[0].x, track.nodes[0].y);
        track.nodes.forEach(n => path.lineTo(n.x, n.y));
        
        car.onGrass = !ctx.isPointInStroke(path, car.x, car.y);

        if(car.onGrass) {
            car.vx *= 0.95; car.vy *= 0.95;
            car.dmg = Math.min(100, car.dmg + 0.1);
        }

        // UI
        document.getElementById('ui-name').innerText = track.name;
        document.getElementById('ui-time').innerText = ((Date.now() - startTime)/1000).toFixed(2) + "s";
        document.getElementById('ui-dmg').innerText = Math.floor(car.dmg) + "%";
    }

    function render() {
        ctx.clearRect(0,0,W,H);
        drawTrack();

        // Render Auta
        ctx.save();
        ctx.translate(car.x, car.y);
        ctx.rotate(car.angle);
        ctx.fillStyle = car.dmg > 80 ? "#555" : "#ff4757";
        ctx.fillRect(-18, -10, 36, 20); // Długość/Szerokość
        ctx.fillStyle = "white"; ctx.fillRect(10, -8, 5, 16); // Szyba
        ctx.restore();

        update();
        requestAnimationFrame(render);
    }

    render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wyścigi 2D - HTML5</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #222;
            color: white;
            font-family: sans-serif;
            overflow: hidden; /* Blokuje przewijanie na telefonach */
            touch-action: none;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #333;
        }
        canvas {
            background-color: #4CAF50; /* Trawa */
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
        }
        .stat-bar {
            width: 100px;
            height: 10px;
            background: #555;
            margin-bottom: 5px;
            border-radius: 5px;
        }
        .stat-fill {
            height: 100%;
            background: #0f0;
            border-radius: 5px;
        }
        /* Mobile Controls */
        #controls {
            height: 30vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #111;
        }
        .row {
            display: flex;
            justify-content: center;
            width: 100%;
        }
        .btn {
            width: 70px;
            height: 70px;
            margin: 5px;
            background-color: #444;
            border: 2px solid #666;
            border-radius: 15px;
            font-size: 30px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .btn:active {
            background-color: #777;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <div>Czas: <span id="timeDisplay">0.00</span> s</div>
            <div>Najlepszy czas: <span id="bestTimeDisplay">--</span></div>
            <div>Cel: <span id="targetDisplay">Checkpoint 1</span></div>
            <div>Paliwo:</div>
            <div class="stat-bar"><div id="fuelBar" class="stat-fill"></div></div>
            <div>Opony:</div>
            <div class="stat-bar"><div id="tiresBar" class="stat-fill"></div></div>
            <div>Stan auta:</div>
            <div class="stat-bar"><div id="healthBar" class="stat-fill"></div></div>
        </div>
    </div>

    <div id="controls">
        <div class="row">
            <div class="btn" id="btnUp">▲</div>
        </div>
        <div class="row">
            <div class="btn" id="btnLeft">◄</div>
            <div class="btn" id="btnDown">▼</div>
            <div class="btn" id="btnRight">►</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Elementy UI
    const timeDisplay = document.getElementById('timeDisplay');
    const bestTimeDisplay = document.getElementById('bestTimeDisplay');
    const targetDisplay = document.getElementById('targetDisplay');
    const fuelBar = document.getElementById('fuelBar');
    const tiresBar = document.getElementById('tiresBar');
    const healthBar = document.getElementById('healthBar');

    // Zmienne wejścia
    const keys = { up: false, down: false, left: false, right: false };

    // Obiekt Auta
    const car = {
        x: 400, y: 500,
        width: 16, height: 30,
        angle: -Math.PI / 2, // Start w górę
        speed: 0,
        maxSpeed: 5,
        acceleration: 0.1,
        friction: 0.05,
        turnSpeed: 0.06,
        
        fuel: 100,
        tires: 100,
        health: 100
    };

    // Obszary trasy
    const trackWidth = 100;
    const startLine = { x: 350, y: 480, w: 100, h: 20 };
    const pitStop = { x: 460, y: 400, w: 60, h: 100 }; // Obok startu
    
    // Checkpointy (wymagane w kolejności od 0 do 3)
    const checkpoints = [
        { x: 650, y: 450, w: 100, h: 20, name: "Checkpoint 1" },
        { x: 650, y: 150, w: 100, h: 20, name: "Checkpoint 2" },
        { x: 150, y: 150, w: 100, h: 20, name: "Checkpoint 3" },
        { x: 150, y: 450, w: 100, h: 20, name: "Checkpoint 4" }
    ];

    let currentTargetIndex = 0; // 0-3 dla checkpointów, 4 dla mety
    let lapStartTime = 0;
    let bestLapTime = Infinity;
    let gameActive = true;

    // Funkcje rysujące trasę (prosty owal z prostokątów)
    function drawTrack() {
        ctx.fillStyle = "#555"; // Asfalt
        // Proste
        ctx.fillRect(100, 100, 600, 100); // Górna
        ctx.fillRect(100, 400, 600, 100); // Dolna
        ctx.fillRect(100, 100, 100, 400); // Lewa
        ctx.fillRect(600, 100, 100, 400); // Prawa

        // Pit Stop
        ctx.fillStyle = "rgba(255, 255, 0, 0.3)";
        ctx.fillRect(pitStop.x, pitStop.y, pitStop.w, pitStop.h);
        ctx.fillStyle = "yellow";
        ctx.font = "12px Arial";
        ctx.fillText("PIT", pitStop.x + 20, pitStop.y + 50);

        // Start / Meta
        ctx.fillStyle = "white";
        ctx.fillRect(startLine.x, startLine.y, startLine.w, startLine.h);
        // Szachownica
        for(let i=0; i<startLine.w; i+=10) {
            ctx.fillStyle = (i/10)%2===0 ? "black" : "white";
            ctx.fillRect(startLine.x + i, startLine.y, 10, startLine.h/2);
            ctx.fillStyle = (i/10)%2!==0 ? "black" : "white";
            ctx.fillRect(startLine.x + i, startLine.y + startLine.h/2, 10, startLine.h/2);
        }

        // Checkpointy (niewidoczne w grze, lub lekko zaznaczone dla gracza)
        ctx.fillStyle = "rgba(0, 200, 255, 0.3)";
        checkpoints.forEach((cp, index) => {
            if (index === currentTargetIndex) {
                ctx.fillStyle = "rgba(255, 0, 0, 0.5)"; // Aktywny checkpoint
            } else {
                ctx.fillStyle = "rgba(0, 200, 255, 0.2)";
            }
            ctx.fillRect(cp.x, cp.y, cp.w, cp.h);
        });
    }

    function isPointInRect(x, y, rect) {
        return x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
    }

    // Sprawdzanie, czy auto jest na asfalcie
    function isOnTrack(x, y) {
        if (isPointInRect(x, y, {x:100, y:100, w:600, h:100})) return true;
        if (isPointInRect(x, y, {x:100, y:400, w:600, h:100})) return true;
        if (isPointInRect(x, y, {x:100, y:100, w:100, h:400})) return true;
        if (isPointInRect(x, y, {x:600, y:100, w:100, h:400})) return true;
        if (isPointInRect(x, y, pitStop)) return true;
        return false;
    }

    function updatePhysics() {
        if (!gameActive) return;

        // Kary za zły stan auta
        let currentMaxSpeed = car.maxSpeed;
        if (car.fuel <= 0) currentMaxSpeed = 0.5; // Brak paliwa to drastyczny spadek prędkości
        if (car.tires <= 0) currentMaxSpeed *= 0.7; // Łyse opony
        if (car.health <= 0) currentMaxSpeed *= 0.5; // Zniszczone auto

        // Przyspieszanie i hamowanie
        if (keys.up && car.fuel > 0) car.speed += car.acceleration;
        if (keys.down) car.speed -= car.acceleration;

        // Tarcie
        if (!keys.up && !keys.down) {
            if (car.speed > 0) car.speed -= car.friction;
            if (car.speed < 0) car.speed += car.friction;
            if (Math.abs(car.speed) < car.friction) car.speed = 0;
        }

        // Limit prędkości
        if (car.speed > currentMaxSpeed) car.speed = currentMaxSpeed;
        if (car.speed < -currentMaxSpeed/2) car.speed = -currentMaxSpeed/2;

        // Skręcanie (tylko w ruchu)
        if (car.speed !== 0) {
            let turnDirection = car.speed > 0 ? 1 : -1;
            let currentTurnSpeed = car.turnSpeed * (car.tires > 0 ? 1 : 0.5); // Gorszy skręt bez opon
            
            if (keys.left) {
                car.angle -= currentTurnSpeed * turnDirection;
                car.tires -= 0.05; // Zużycie opon przy skręcie
            }
            if (keys.right) {
                car.angle += currentTurnSpeed * turnDirection;
                car.tires -= 0.05;
            }
        }

        // Aktualizacja pozycji
        car.x += Math.cos(car.angle) * car.speed;
        car.y += Math.sin(car.angle) * car.speed;

        // Zużycie paliwa
        if (Math.abs(car.speed) > 0) car.fuel -= 0.02;

        // Uszkodzenia, jeśli zjechaliśmy na trawę
        if (!isOnTrack(car.x, car.y) && Math.abs(car.speed) > 0.5) {
            car.health -= 0.1;
            car.speed *= 0.95; // Trawa spowalnia
        }

        // Limitowanie statystyk
        car.fuel = Math.max(0, car.fuel);
        car.tires = Math.max(0, car.tires);
        car.health = Math.max(0, car.health);

        checkLogic();
    }

    function checkLogic() {
        // Obsługa Pit Stopu
        if (isPointInRect(car.x, car.y, pitStop) && Math.abs(car.speed) < 0.2) {
            car.fuel = Math.min(100, car.fuel + 0.5);
            car.tires = Math.min(100, car.tires + 0.5);
            car.health = Math.min(100, car.health + 0.5);
        }

        // Checkpointy i okrążenia
        if (currentTargetIndex < 4) {
            let cp = checkpoints[currentTargetIndex];
            if (isPointInRect(car.x, car.y, cp)) {
                currentTargetIndex++;
                if (currentTargetIndex === 4) {
                    targetDisplay.innerText = "META!";
                } else {
                    targetDisplay.innerText = checkpoints[currentTargetIndex].name;
                }
            }
        } else if (currentTargetIndex === 4) {
            // Czekamy na linię mety
            if (isPointInRect(car.x, car.y, startLine)) {
                let lapTime = (Date.now() - lapStartTime) / 1000;
                if (lapTime < bestLapTime) bestLapTime = lapTime;
                
                // Reset na nowe okrążenie
                currentTargetIndex = 0;
                lapStartTime = Date.now();
                targetDisplay.innerText = "Checkpoint 1";
            }
        }
    }

    function updateUI() {
        if (lapStartTime > 0) {
            let currentTime = (Date.now() - lapStartTime) / 1000;
            timeDisplay.innerText = currentTime.toFixed(2);
        }
        if (bestLapTime !== Infinity) {
            bestTimeDisplay.innerText = bestLapTime.toFixed(2) + " s";
        }

        fuelBar.style.width = car.fuel + "%";
        fuelBar.style.background = car.fuel > 20 ? "#0f0" : "#f00";
        
        tiresBar.style.width = car.tires + "%";
        tiresBar.style.background = car.tires > 20 ? "#0f0" : "#f00";
        
        healthBar.style.width = car.health + "%";
        healthBar.style.background = car.health > 20 ? "#0f0" : "#f00";
    }

    function drawCar() {
        ctx.save();
        ctx.translate(car.x, car.y);
        ctx.rotate(car.angle);
        
        // Ciało auta
        ctx.fillStyle = "red";
        ctx.fillRect(-car.height/2, -car.width/2, car.height, car.width);
        
        // Szyba wskazująca przód
        ctx.fillStyle = "black";
        ctx.fillRect(car.height/4, -car.width/2 + 2, car.height/4, car.width - 4);
        
        ctx.restore();
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Inicjalizacja czasu przy starcie
        if (lapStartTime === 0 && car.speed > 0) {
            lapStartTime = Date.now();
        }

        drawTrack();
        updatePhysics();
        drawCar();
        updateUI();

        requestAnimationFrame(gameLoop);
    }

    // --- STEROWANIE ---

    // Klawiatura
    window.addEventListener('keydown', (e) => {
        if (e.key === "ArrowUp" || e.key === "w") keys.up = true;
        if (e.key === "ArrowDown" || e.key === "s") keys.down = true;
        if (e.key === "ArrowLeft" || e.key === "a") keys.left = true;
        if (e.key === "ArrowRight" || e.key === "d") keys.right = true;
    });

    window.addEventListener('keyup', (e) => {
        if (e.key === "ArrowUp" || e.key === "w") keys.up = false;
        if (e.key === "ArrowDown" || e.key === "s") keys.down = false;
        if (e.key === "ArrowLeft" || e.key === "a") keys.left = false;
        if (e.key === "ArrowRight" || e.key === "d") keys.right = false;
    });

    // Dotyk dla mobile
    function setupTouchBtn(id, keyObj) {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyObj] = true; });
        btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyObj] = false; });
    }

    setupTouchBtn('btnUp', 'up');
    setupTouchBtn('btnDown', 'down');
    setupTouchBtn('btnLeft', 'left');
    setupTouchBtn('btnRight', 'right');

    // Start gry
    gameLoop();
</script>
</body>
</html>

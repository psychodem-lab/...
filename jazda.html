<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Racing - Track Edition</title>
    <style>
        :root { --accent: #00d4ff; --meta: #ff4757; --active: #eccc68; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; touch-action: none; font-family: 'Segoe UI', Arial, sans-serif; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; }
        
        #hud { 
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); 
            padding: 10px; border-radius: 8px; border-left: 4px solid var(--accent); 
            color: white; z-index: 10; pointer-events: none; backdrop-filter: blur(5px); font-size: 11px;
        }
        .hud-row { font-size: 8px; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; opacity: 0.7; }
        .hud-val { font-size: 14px; font-weight: 900; color: #fff; display: block; }
        
        #settings-btn { 
            position: absolute; top: 10px; right: 10px; padding: 12px 18px; 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 8px; color: white; cursor: pointer; z-index: 20;
        }
        
        #menu-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; overflow-y: auto; padding: 20px; }
        .menu-card { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 90%; max-width: 450px; }
        
        .section-title { font-size: 12px; color: var(--accent); margin: 15px 0 5px 0; text-transform: uppercase; letter-spacing: 2px; }
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .mode-btn { padding: 10px; background: #222; border: 2px solid #444; border-radius: 10px; color: white; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .mode-btn.active { border-color: var(--accent); background: #003a4d; }
        
        canvas { display: block; background: #1b5e20; flex-grow: 1; width: 100%; height: auto; max-height: 65vh; object-fit: contain; }

        #controls-root { width: 100%; height: 35vh; min-height: 180px; background: #0f0f0f; border-top: 2px solid #222; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        .joy-container { width: 110px; height: 110px; background: radial-gradient(circle, #222 0%, #111 100%); border-radius: 50%; border: 3px solid #333; position: relative; display: flex; align-items: center; justify-content: center; touch-action: none; }
        .joy-handle { width: 45px; height: 45px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 15px var(--accent); opacity: 0.8; position: absolute; pointer-events: none; }
        
        #arrows-ui { display: none; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .arrow-btn { width: 60px; height: 60px; background: #222; border: 1px solid #444; color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; user-select: none; }
        .arrow-btn:active { background: var(--accent); color: black; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div class="hud-row">Trasa</div>
        <span id="ui-track-name" class="hud-val" style="color:var(--accent)">-</span>
        <div class="hud-row">Czas Okrążenia</div>
        <span id="ui-time" class="hud-val">0.00s</span>
        <div class="hud-row">Najlepszy</div>
        <span id="ui-best" class="hud-val" style="color:var(--active)">--</span>
        <div class="hud-row">Uszkodzenia</div>
        <span id="ui-dmg" class="hud-val" style="color:var(--meta)">0%</span>
    </div>

    <div id="settings-btn" onclick="openMenu()">⚙</div>

    <div id="menu-overlay">
        <div class="menu-card">
            <h2 style="margin:0 0 10px 0">USTAWIENIA</h2>
            
            <div class="section-title">Wybierz Trasę</div>
            <div class="mode-grid" id="track-selection">
                </div>

            <div class="section-title">Sterowanie</div>
            <div class="mode-grid">
                <div class="mode-btn" id="m-arrows" onclick="setControl('arrows')">Strzałki</div>
                <div class="mode-btn" id="m-two" onclick="setControl('two')">2 Joysticki</div>
            </div>

            <button onclick="closeMenu()" style="margin-top:10px; padding:15px; background:var(--accent); border:none; border-radius:15px; font-weight:bold; width: 100%; cursor:pointer;">POWRÓT DO GRY</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls-root">
        <div id="joy-l-box" class="joy-container"><div id="joy-l-handle" class="joy-handle"></div></div>
        <div id="arrows-ui">
            <div></div><div class="arrow-btn" id="btn-u">↑</div><div></div>
            <div class="arrow-btn" id="btn-l">←</div><div class="arrow-btn" id="btn-d">↓</div><div class="arrow-btn" id="btn-r">→</div>
        </div>
        <div id="joy-r-box" class="joy-container"><div id="joy-r-handle" class="joy-handle"></div></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = 1200, H = 850;
    canvas.width = W; canvas.height = H;

    // --- BAZA DANYCH TRAS ---
    const tracks = [
        {
            name: "Szybki Owal",
            start: { x: 600, y: 740, a: Math.PI },
            outer: [100, 100, 1000, 650, 180],
            inner: [220, 220, 760, 410, 100],
            gates: [
                { x1: 600, y1: 690, x2: 600, y2: 810 }, // META
                { x1: 40, y1: 425, x2: 160, y2: 425 },   // CP1
                { x1: 600, y1: 40, x2: 600, y2: 160 },   // CP2
                { x1: 1040, y1: 425, x2: 1160, y2: 425 } // CP3
            ],
            cones: [{x:400, y:350}, {x:800, y:350}, {x:600, y:220}]
        },
        {
            name: "Techniczny Kwadrat",
            start: { x: 300, y: 740, a: Math.PI },
            outer: [200, 100, 800, 650, 20],
            inner: [350, 250, 500, 350, 10],
            gates: [
                { x1: 300, y1: 690, x2: 300, y2: 810 },
                { x1: 140, y1: 200, x2: 260, y2: 200 },
                { x1: 940, y1: 200, x2: 1060, y2: 200 },
                { x1: 940, y1: 650, x2: 1060, y2: 650 }
            ],
            cones: [{x:250, y:150}, {x:950, y:150}, {x:950, y:700}, {x:250, y:700}]
        },
        {
            name: "Ósemka Concept",
            start: { x: 600, y: 425, a: Math.PI },
            outer: [100, 150, 450, 550, 200], // Lewa pętla
            outer2: [650, 150, 450, 550, 200], // Prawa pętla
            inner: [200, 250, 250, 350, 100],
            inner2: [750, 250, 250, 350, 100],
            gates: [
                { x1: 550, y1: 350, x2: 650, y2: 500 },
                { x1: 150, y1: 425, x2: 300, y2: 425 },
                { x1: 900, y1: 425, x2: 1050, y2: 425 }
            ],
            cones: [{x:600, y:300}, {x:600, y:550}]
        }
    ];

    let currentTrackIdx = 0;
    let controlMode = 'two';
    const input = { up: 0, down: 0, left: 0, right: 0 };
    
    const car = {
        x: 0, y: 0, angle: 0, vx: 0, vy: 0, speed: 0,
        maxS: 7, acc: 0.15, frict: 0.96, turnS: 0.08,
        w: 20, h: 36, dmg: 0, onGrass: false
    };

    let activeCones = [];
    let particles = [];
    let startTime = 0, bestTimes = [Infinity, Infinity, Infinity], running = false, currentCp = 0;

    // --- INICJALIZACJA SYSTEMU ---
    function initTrackSelection() {
        const container = document.getElementById('track-selection');
        tracks.forEach((t, idx) => {
            const btn = document.createElement('div');
            btn.className = 'mode-btn' + (idx === 0 ? ' active' : '');
            btn.id = 't-' + idx;
            btn.innerText = t.name;
            btn.onclick = () => loadTrack(idx);
            container.appendChild(btn);
        });
    }

    function loadTrack(idx) {
        currentTrackIdx = idx;
        const t = tracks[idx];
        
        // Reset Auta
        car.x = t.start.x;
        car.y = t.start.y;
        car.angle = t.start.a;
        car.vx = 0; car.vy = 0; car.speed = 0; car.dmg = 0;
        
        // Reset Logiki
        running = false;
        currentCp = 0;
        particles = [];
        
        // Kopiowanie pachołków (by można je było przesuwać bez niszczenia wzorca)
        activeCones = t.cones.map(c => ({...c, vx:0, vy:0, r:7}));
        
        // UI
        document.querySelectorAll('#track-selection .mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('t-' + idx).classList.add('active');
        document.getElementById('ui-track-name').innerText = t.name;
        document.getElementById('ui-best').innerText = bestTimes[idx] === Infinity ? "--" : bestTimes[idx].toFixed(2) + "s";
        
        closeMenu();
    }

    function drawWorld() {
        const t = tracks[currentTrackIdx];
        ctx.fillStyle = '#1b5e20'; ctx.fillRect(0,0,W,H);
        
        // Rysowanie asfaltu
        ctx.lineJoin = "round";
        const drawPath = (data, color, width, isStroke) => {
            ctx.beginPath();
            ctx.strokeStyle = color; ctx.lineWidth = width;
            ctx.roundRect(...data);
            isStroke ? ctx.stroke() : ctx.fill();
        };

        // Warstwa asfaltu
        ctx.setLineDash([]);
        drawPath(t.outer, '#222', 135, true);
        if(t.outer2) drawPath(t.outer2, '#222', 135, true);
        drawPath(t.outer, '#333', 120, true);
        if(t.outer2) drawPath(t.outer2, '#333', 120, true);
        
        // Wypełnienie środka trawą
        ctx.fillStyle = '#1b5e20';
        const inner = new Path2D();
        inner.roundRect(...t.inner);
        if(t.inner2) inner.roundRect(...t.inner2);
        ctx.fill(inner);

        // Punkty kontrolne
        t.gates.forEach((g, i) => {
            ctx.beginPath();
            ctx.strokeStyle = (i === currentCp) ? '#ffff00' : (i === 0 ? '#ff4757' : 'rgba(255,255,255,0.2)');
            ctx.lineWidth = 6;
            ctx.moveTo(g.x1, g.y1); ctx.lineTo(g.x2, g.y2);
            ctx.stroke();
        });
    }

    function updatePhysics() {
        const t = tracks[currentTrackIdx];
        
        // Fizyka silnika
        let thrust = (input.up > 0 && car.dmg < 100) ? car.acc * input.up : 0;
        if (input.down > 0) thrust = -(car.acc * 0.5) * input.down;

        let speedFactor = Math.min(1, Math.abs(car.speed) / (car.maxS * 0.5));
        car.angle += (input.right - input.left) * car.turnS * speedFactor * (car.speed < 0 ? -1 : 1);

        let fX = Math.cos(car.angle), fY = Math.sin(car.angle);
        car.vx += fX * thrust; car.vy += fY * thrust;

        // Drift & Grip
        let dot = car.vx * fX + car.vy * fY;
        let grip = car.onGrass ? 0.88 : 0.84;
        car.vx = fX * dot + (car.vx - fX * dot) * grip;
        car.vy = fY * dot + (car.vy - fY * dot) * grip;

        car.vx *= car.frict; car.vy *= car.frict;
        car.speed = Math.hypot(car.vx, car.vy);
        car.x += car.vx; car.y += car.vy;

        // Detekcja nawierzchni
        const checkPath = new Path2D();
        checkPath.roundRect(...t.outer);
        if(t.outer2) checkPath.roundRect(...t.outer2);
        ctx.lineWidth = 120;
        const onAsphalt = ctx.isPointInStroke(checkPath, car.x, car.y);
        
        const checkInner = new Path2D();
        checkInner.roundRect(...t.inner);
        if(t.inner2) checkInner.roundRect(...t.inner2);
        const onInnerGrass = ctx.isPointInPath(checkInner, car.x, car.y);
        
        car.onGrass = !onAsphalt || onInnerGrass;

        if(car.onGrass) {
            car.vx *= 0.94; car.vy *= 0.94;
            car.dmg = Math.min(100, car.dmg + 0.12);
            if(car.speed > 1 && Math.random() > 0.4) {
                particles.push({x: car.x, y: car.y, vx: -car.vx*0.5, vy: -car.vy*0.5, life: 1});
            }
        }

        // Pachołki
        activeCones.forEach(c => {
            let dist = Math.hypot(c.x - car.x, c.y - car.y);
            if(dist < 25) {
                c.vx += (c.x - car.x)/dist * car.speed;
                c.vy += (c.y - car.y)/dist * car.speed;
                car.dmg += 0.5;
            }
            c.x += c.vx; c.y += c.vy; c.vx *= 0.9; c.vy *= 0.9;
        });

        // Bramki
        let g = t.gates[currentCp];
        if(Math.hypot(car.x - (g.x1+g.x2)/2, car.y - (g.y1+g.y2)/2) < 70) {
            if(currentCp === 0) {
                if(!running) { running = true; startTime = Date.now(); }
                else {
                    let lap = (Date.now() - startTime)/1000;
                    if(lap < bestTimes[currentTrackIdx]) {
                        bestTimes[currentTrackIdx] = lap;
                        document.getElementById('ui-best').innerText = lap.toFixed(2) + "s";
                    }
                    startTime = Date.now();
                }
            }
            currentCp = (currentCp + 1) % t.gates.length;
        }

        particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.04; });
        particles = particles.filter(p => p.life > 0);
    }

    function render() {
        ctx.clearRect(0,0,W,H);
        drawWorld();

        particles.forEach(p => {
            ctx.fillStyle = `rgba(100,150,50,${p.life})`;
            ctx.beginPath(); ctx.arc(p.x, p.y, 5*p.life, 0, 7); ctx.fill();
        });

        activeCones.forEach(c => {
            ctx.fillStyle = "#ff6b00"; ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, 7); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(c.x, c.y, c.r*0.4, 0, 7); ctx.fill();
        });

        // Car Shadow
        ctx.save(); ctx.translate(car.x+6, car.y+6); ctx.rotate(car.angle);
        ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(-car.h/2, -car.w/2, car.h, car.w);
        ctx.restore();

        // Car Body
        ctx.save(); ctx.translate(car.x, car.y); ctx.rotate(car.angle);
        ctx.fillStyle = car.dmg > 85 ? "#333" : "#ff4757";
        ctx.fillRect(-car.h/2, -car.w/2, car.h, car.w);
        ctx.fillStyle = "#000"; ctx.fillRect(car.h/4, -car.w/2+2, 5, car.w-4); // Szyba
        ctx.restore();

        document.getElementById('ui-time').innerText = running ? ((Date.now() - startTime)/1000).toFixed(2) + "s" : "0.00s";
        document.getElementById('ui-dmg').innerText = Math.floor(car.dmg) + "%";
        requestAnimationFrame(render);
    }

    // --- UI & CONTROLS ---
    function openMenu() { document.getElementById('menu-overlay').style.display = 'flex'; }
    function closeMenu() { document.getElementById('menu-overlay').style.display = 'none'; }
    
    function setControl(mode) {
        controlMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('m-' + mode).classList.add('active');
        document.getElementById('arrows-ui').style.display = (mode === 'arrows') ? 'grid' : 'none';
        document.getElementById('joy-l-box').style.display = (mode === 'arrows') ? 'none' : 'flex';
        document.getElementById('joy-r-box').style.display = (mode === 'two') ? 'flex' : 'none';
    }

    // Wsparcie Joysticków (Analogowe)
    function initJoy(boxId, handleId, type) {
        const box = document.getElementById(boxId);
        const handle = document.getElementById(handleId);
        let tid = null;

        const move = (cx, cy) => {
            const r = box.getBoundingClientRect();
            const dx = cx - (r.left + r.width/2), dy = cy - (r.top + r.height/2);
            const dist = Math.min(Math.sqrt(dx*dx+dy*dy), r.width/2.5);
            const ang = Math.atan2(dy, dx);
            const tx = Math.cos(ang)*dist, ty = Math.sin(ang)*dist;
            handle.style.transform = `translate(${tx}px, ${ty}px)`;
            
            const nx = tx/(r.width/2.5), ny = ty/(r.width/2.5);
            if(type === 'L' || controlMode === 'one') { input.up = ny < -0.1 ? -ny : 0; input.down = ny > 0.1 ? ny : 0; }
            if(type === 'R' || controlMode === 'one') { input.left = nx < -0.1 ? -nx : 0; input.right = nx > 0.1 ? nx : 0; }
        };

        box.addEventListener('touchstart', e => { e.preventDefault(); tid = e.changedTouches[0].identifier; move(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
        window.addEventListener('touchmove', e => { Array.from(e.changedTouches).forEach(t => { if(t.identifier === tid) move(t.clientX, t.clientY); }); }, {passive:false});
        const stop = (e) => { Array.from(e.changedTouches).forEach(t => { if(t.identifier === tid) { tid = null; handle.style.transform = 'none'; 
            if(type === 'L' || controlMode === 'one') { input.up = 0; input.down = 0; }
            if(type === 'R' || controlMode === 'one') { input.left = 0; input.right = 0; }
        }});};
        window.addEventListener('touchend', stop);
    }

    // Klawiatura
    window.addEventListener('keydown', e => {
        if(e.key==='ArrowUp') input.up=1; if(e.key==='ArrowDown') input.down=1;
        if(e.key==='ArrowLeft') input.left=1; if(e.key==='ArrowRight') input.right=1;
    });
    window.addEventListener('keyup', e => {
        if(e.key==='ArrowUp') input.up=0; if(e.key==='ArrowDown') input.down=0;
        if(e.key==='ArrowLeft') input.left=0; if(e.key==='ArrowRight') input.right=0;
    });

    initTrackSelection();
    loadTrack(0);
    initJoy('joy-l-box', 'joy-l-handle', 'L');
    initJoy('joy-r-box', 'joy-r-handle', 'R');
    setInterval(updatePhysics, 1000/60);
    requestAnimationFrame(render);
</script>
</body>
</html>

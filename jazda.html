<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Racing Prototyp</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; touch-action: none;
        }
        #gameCanvas {
            display: block; width: 100vw; height: 65vh; background-color: #2e7d32;
        }
        #ui-layer {
            position: absolute; top: 10px; left: 10px;
            color: white; font-size: 13px; line-height: 1.4;
            background: rgba(0,0,0,0.7); padding: 12px; border-radius: 10px;
            pointer-events: none; border: 1px solid #444;
        }
        .stat-val { font-weight: bold; color: #00e676; }
        #controls {
            height: 35vh; background-color: #263238;
            display: flex; justify-content: center; align-items: center;
        }
        .grid-ctrl {
            display: grid; grid-template-columns: 70px 70px 70px; grid-gap: 15px;
        }
        .btn {
            background: #455a64; border: none; border-radius: 15px;
            color: white; font-size: 28px; width: 70px; height: 70px;
            box-shadow: 0 4px #263238; active: transform: translateY(2px);
        }
        .btn:active { background: #546e7a; box-shadow: 0 2px #263238; }
        .empty { visibility: hidden; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div>Czas: <span id="time" class="stat-val">0.00</span>s</div>
        <div>Najlepszy: <span id="bestTime" class="stat-val">--</span>s</div>
        <div>Okrążenie: <span id="lap" class="stat-val">0</span></div>
        <div>Bramka: <span id="cp" class="stat-val">0/4</span></div>
        <div style="margin-top:5px; height:2px; background:#444;"></div>
        <div style="color:#ffca28;">Paliwo: <span id="fuel">100</span>%</div>
        <div style="color:#ffa726;">Opony: <span id="tires">100</span>%</div>
        <div style="color:#ef5350;">Uszkodzenia: <span id="damage">0</span>%</div>
    </div>

    <div id="controls">
        <div class="grid-ctrl">
            <div class="empty"></div>
            <button class="btn" id="btnUp">↑</button>
            <div class="empty"></div>
            <button class="btn" id="btnLeft">←</button>
            <button class="btn" id="btnDown">↓</button>
            <button class="btn" id="btnRight">→</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Dopasowanie canvasu do ekranu
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight * 0.65;
    }
    window.addEventListener('resize', resize);
    resize();

    const ui = {
        time: document.getElementById('time'),
        best: document.getElementById('bestTime'),
        lap: document.getElementById('lap'),
        cp: document.getElementById('cp'),
        fuel: document.getElementById('fuel'),
        tires: document.getElementById('tires'),
        dmg: document.getElementById('damage')
    };

    const keys = { up: false, down: false, left: false, right: false };

    // Start ustawiony na dole toru, auto skierowane w lewo (-PI)
    const car = {
        x: 450, y: canvas.height - 80, 
        angle: -Math.PI, 
        speed: 0,
        maxSpeed: 6, acc: 0.12, friction: 0.96, turnSpeed: 0.07,
        w: 12, h: 22,
        fuel: 100, tires: 100, dmg: 0
    };

    let startTime = 0, running = false, lapTime = 0, bestLap = Infinity, laps = 0;

    // Definicja zaokrąglonego toru (elipsa jako baza)
    const trackWidth = 80;
    const trackPadding = 100;

    // Checkpointy jako linie (bramki)
    const checkpoints = [
        { x1: 400, y1: canvas.height-120, x2: 400, y2: canvas.height-40, passed: false }, // Meta/Start
        { x1: 60, y1: 150, x2: 140, y2: 150, passed: false },   // Lewy bok
        { x1: 400, y1: 40, x2: 400, y2: 120, passed: false },    // Góra
        { x1: canvas.width-140, y1: 150, x2: canvas.width-60, y2: 150, passed: false } // Prawy bok
    ];
    let currentCp = 0;

    const pit = { x: 500, y: canvas.height - 75, w: 80, h: 50 };

    function update() {
        // Fizyka i wejście
        if (keys.up && car.fuel > 0 && car.dmg < 100) {
            car.speed += car.acc;
            car.fuel -= 0.04;
        }
        if (keys.down) car.speed -= car.acc;
        
        car.speed *= car.friction;
        let tMod = Math.max(0.3, car.tires / 100);
        if (Math.abs(car.speed) > 0.2) {
            if (keys.left) car.angle -= car.turnSpeed * tMod;
            if (keys.right) car.angle += car.turnSpeed * tMod;
        }

        car.x += Math.cos(car.angle) * car.speed;
        car.y += Math.sin(car.angle) * car.speed;

        if (Math.abs(car.speed) > 1) car.tires -= 0.008;

        // Kolizje z "bandami" (uproszczone granice ekranu)
        if (car.x < 20 || car.x > canvas.width - 20 || car.y < 20 || car.y > canvas.height - 20) {
            car.speed *= -0.5;
            car.dmg = Math.min(100, car.dmg + 2);
        }

        // Checkpointy (przecinanie linii)
        let target = checkpoints[currentCp];
        if (checkLineIntersection(car.x, car.y, target)) {
            if (currentCp === 0) {
                if (!running) { running = true; startTime = performance.now(); }
                else {
                    laps++;
                    let finish = (performance.now() - startTime) / 1000;
                    if (finish < bestLap) bestLap = finish;
                    startTime = performance.now();
                }
            }
            currentCp = (currentCp + 1) % checkpoints.length;
        }

        // Pit stop
        if (Math.abs(car.speed) < 0.5 && car.x > pit.x && car.x < pit.x + pit.w && car.y > pit.y && car.y < pit.y + pit.h) {
            car.fuel = Math.min(100, car.fuel + 0.5);
            car.tires = Math.min(100, car.tires + 0.5);
            car.dmg = Math.max(0, car.dmg - 0.5);
        }

        render();
        requestAnimationFrame(update);
    }

    // Funkcja sprawdzająca czy auto jest blisko linii checkpointu
    function checkLineIntersection(px, py, line) {
        let dist = Math.hypot(px - (line.x1 + line.x2)/2, py - (line.y1 + line.y2)/2);
        return dist < 40; // Prosta detekcja zbliżeniowa do bramki
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Rysowanie zaokrąglonego toru (asfalt)
        ctx.strokeStyle = '#455a64';
        ctx.lineWidth = trackWidth;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        
        ctx.beginPath();
        ctx.roundRect(trackPadding, 60, canvas.width - trackPadding*2, canvas.height - 140, 100);
        ctx.stroke();

        // Krawężniki (biało-czerwone)
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 5;
        ctx.stroke();

        // Pit Stop Area
        ctx.fillStyle = 'rgba(33, 150, 243, 0.4)';
        ctx.fillRect(pit.x, pit.y, pit.w, pit.h);
        ctx.fillStyle = 'white'; ctx.font = "10px Arial";
        ctx.fillText("PIT STOP", pit.x + 15, pit.y + 30);

        // Bramki (Checkpointy)
        checkpoints.forEach((cp, i) => {
            ctx.strokeStyle = (i === currentCp) ? '#ffeb3b' : 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 4;
            if (i === 0) ctx.strokeStyle = '#f44336'; // Start/Meta na czerwono
            ctx.beginPath();
            ctx.moveTo(cp.x1, cp.y1); ctx.lineTo(cp.x2, cp.y2);
            ctx.stroke();
        });

        // Samochód
        ctx.save();
        ctx.translate(car.x, car.y);
        ctx.rotate(car.angle);
        ctx.fillStyle = '#d32f2f';
        ctx.fillRect(-car.h/2, -car.w/2, car.h, car.w);
        // Światła/Przód
        ctx.fillStyle = '#fff';
        ctx.fillRect(car.h/2 - 4, -car.w/2, 4, 3);
        ctx.fillRect(car.h/2 - 4, car.w/2 - 3, 4, 3);
        ctx.restore();

        // UI Update
        if (running) ui.time.innerText = ((performance.now() - startTime) / 1000).toFixed(2);
        if (bestLap !== Infinity) ui.best.innerText = bestLap.toFixed(2);
        ui.lap.innerText = laps;
        ui.cp.innerText = `${currentCp}/4`;
        ui.fuel.innerText = Math.floor(car.fuel);
        ui.tires.innerText = Math.floor(car.tires);
        ui.dmg.innerText = Math.floor(car.dmg);
    }

    // Sterowanie
    const bind = (id, k) => {
        const b = document.getElementById(id);
        b.onmousedown = b.ontouchstart = (e) => { e.preventDefault(); keys[k] = true; };
        b.onmouseup = b.onmouseleave = b.ontouchend = () => keys[k] = false;
    };
    bind('btnUp', 'up'); bind('btnDown', 'down');
    bind('btnLeft', 'left'); bind('btnRight', 'right');
    window.onkeydown = (e) => {
        if(e.key === 'ArrowUp') keys.up = true;
        if(e.key === 'ArrowDown') keys.down = true;
        if(e.key === 'ArrowLeft') keys.left = true;
        if(e.key === 'ArrowRight') keys.right = true;
    };
    window.onkeyup = (e) => {
        if(e.key === 'ArrowUp') keys.up = false;
        if(e.key === 'ArrowDown') keys.down = false;
        if(e.key === 'ArrowLeft') keys.left = false;
        if(e.key === 'ArrowRight') keys.right = false;
    };

    requestAnimationFrame(update);
</script>
</body>
</html>
